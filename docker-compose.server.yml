services:
  postgres:
    image: postgres:16
    container_name: film-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: ghcr.io/maximluc/film-backend:latest
    container_name: film-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_DRIVER: ${DATABASE_DRIVER}
      DATABASE_HOST: postgres
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      LOGGER_TYPE: ${LOGGER_TYPE}

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: film-pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  frontend:
    image: ghcr.io/maximluc/film-frontend:latest
    container_name: film-frontend
    restart: "no"
    volumes:
      - frontend_dist:/frontend-dist
    command: sh -c "cp -r /app/dist/* /frontend-dist/"

  nginx:
    image: ghcr.io/maximluc/film-nginx:latest
    container_name: film-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html

volumes:
  postgres_data:
  pgadmin_data:
  frontend_dist:
